name: cycle-099 cross-runtime-diff (FR-3.9 6-stage resolver parity)

# cycle-099 Sprint 1D (T1.12) → Sprint 2D (T2.6) — cross-runtime byte-equality
# gate per SDD §7.6.2.
#
# Sprint 1D shipped: alias-lookup-only subset across bash + python + TS
# runners. Sprint 2D extends Python + bash runners to the full FR-3.9 6-stage
# resolver. The TS runner is gated to its own pre-Sprint-2D shape until
# Sprint 2D.c (T2.6 TS port via Python+Jinja2 codegen) lands.
#
# This file gates Python+bash byte-equality on the Sprint 2D shape. The TS
# runner is exercised by `bun-runner.yml` independently (against the
# unchanged `sprint_1d_query.alias` field in the fixture corpus). When 2D.c
# ships, the TS leg will be folded back into this gate.
#
# Mandatory gate: any divergence between Python and bash causes the PR to
# fail with `[CROSS-RUNTIME-DIFF-FAIL]` and the specific diverged bytes.

on:
  # cypherpunk HIGH-2 + gp MEDIUM-2 (PR #735 review): no workflow_run trigger
  # to avoid the ~4×-per-PR run pattern and cross-workflow permission surface.
  pull_request:
    paths:
      - 'tests/fixtures/model-resolution/**'
      - 'tests/bash/golden_resolution.sh'
      - 'tests/bash/golden_resolution.bats'
      - 'tests/python/golden_resolution.py'
      - 'tests/integration/sprint-2D-resolver-parity.bats'
      - '.claude/scripts/generated-model-maps.sh'
      - '.claude/scripts/lib/model-resolver.sh'
      - '.claude/scripts/lib/model-resolver.py'
      - '.claude/data/trajectory-schemas/model-resolver-output.schema.json'
      - '.github/workflows/cross-runtime-diff.yml'

permissions:
  contents: read

concurrency:
  group: cycle099-sprint-1d-diff-${{ github.ref }}
  cancel-in-progress: true

jobs:
  cross-runtime-diff:
    name: T2.6 cross-runtime byte-equality gate (Python+bash)
    runs-on: ubuntu-latest
    steps:
      # PINNING: SHA verified against actions/checkout v4.3.1 tag
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      # PINNING: SHA matches actions/setup-python v5.3.0 used elsewhere in repo.
      - uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0
        with:
          python-version: '3.13'

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install 'pyyaml==6.0.2' 'jsonschema==4.23.0'

      - name: Install yq v4.52.4 (pinned + checksum verified)
        run: |
          set -euo pipefail
          local_yq=/usr/local/bin/yq
          expected_sha256='0c4d965ea944b64b8fddaf7f27779ee3034e5693263786506ccd1c120f184e8c'
          sudo wget -qO "$local_yq" https://github.com/mikefarah/yq/releases/download/v4.52.4/yq_linux_amd64
          echo "$expected_sha256  $local_yq" | sha256sum -c -
          sudo chmod +x "$local_yq"

      - name: Run bash runner
        run: bash tests/bash/golden_resolution.sh > bash-out.jsonl

      - name: Run python runner
        run: python tests/python/golden_resolution.py > python-out.jsonl

      - name: Verify byte-equal Python ↔ bash
        run: |
          set -euo pipefail
          echo "=== bash output ==="
          cat bash-out.jsonl
          echo "=== python output ==="
          cat python-out.jsonl
          if ! diff -u bash-out.jsonl python-out.jsonl > /tmp/bash-vs-python.diff; then
            echo "::error::[CROSS-RUNTIME-DIFF-FAIL] bash vs python diverge:"
            cat /tmp/bash-vs-python.diff
            exit 1
          fi
          echo "OK — bash == python (byte-equal, $(wc -l < bash-out.jsonl) lines)"
          echo ""
          # TODO(cycle-099-sprint-2D.c): restore TS runner to the byte-equality
          # gate when the TS port via Python+Jinja2 codegen lands. Until then,
          # TS divergence from Python+bash on the FR-3.9 6-stage shape is
          # invisible to this workflow; the TS runner is independently
          # exercised by .github/workflows/bun-runner.yml against the Sprint 1D
          # `sprint_1d_query.alias` subset (which does NOT cover stages 3-6).
          echo "Note: TS runner gate deferred until cycle-099 Sprint 2D.c (T2.6 TS"
          echo "port via Python+Jinja2 codegen). The TS runner is exercised"
          echo "independently by .github/workflows/bun-runner.yml against the"
          echo "Sprint 1D \`sprint_1d_query.alias\` subset (does NOT cover stages 3-6)."

      - name: Verify output matches committed golden file
        run: |
          set -euo pipefail
          if [ ! -f tests/fixtures/model-resolution/_golden.bash.jsonl ]; then
            echo "::error::Committed golden file missing"
            exit 1
          fi
          if ! diff -u tests/fixtures/model-resolution/_golden.bash.jsonl bash-out.jsonl; then
            echo "::error::Runner output drifted from committed golden file"
            echo "Regenerate via: bash tests/bash/golden_resolution.sh > tests/fixtures/model-resolution/_golden.bash.jsonl"
            exit 1
          fi
          echo "OK — output matches committed golden file"

      - name: Validate output against JSON Schema
        run: |
          set -euo pipefail
          python - <<'PY'
          import json, sys
          from jsonschema import validate, ValidationError
          with open('.claude/data/trajectory-schemas/model-resolver-output.schema.json') as fh:
              schema = json.load(fh)
          errors = 0
          for runtime in ('bash', 'python'):
              path = f'{runtime}-out.jsonl'
              with open(path) as fh:
                  for lineno, line in enumerate(fh, start=1):
                      line = line.rstrip('\n')
                      if not line:
                          continue
                      try:
                          doc = json.loads(line)
                          validate(doc, schema)
                      except (json.JSONDecodeError, ValidationError) as exc:
                          msg = exc.msg if hasattr(exc, 'msg') else exc.message
                          print(f'::error::{runtime} line {lineno}: {msg}')
                          print(f'  on: {line}')
                          errors += 1
          if errors:
              sys.exit(1)
          print('OK — both runners conform to model-resolver-output.schema.json')
          PY
