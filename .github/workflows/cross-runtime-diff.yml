name: cycle-099 Sprint 1D cross-runtime-diff

# cycle-099 Sprint 1D (T1.12) — cross-runtime byte-equality gate per
# SDD §7.6.2. Downloads each runtime's golden-resolution output artifact
# (bash, python, TS) and asserts byte-equality. Mismatch fails the build.
#
# This is the MANDATORY gate: any divergence between runtimes causes the
# PR to fail. Operators see a clear `[CROSS-RUNTIME-DIFF-FAIL]` error
# with the specific bytes that diverged.

on:
  # cypherpunk HIGH-2 + gp MEDIUM-2 (PR #735 review): the inline-run pattern
  # below makes workflow_run a duplicate trigger. Removed to avoid the
  # ~4×-per-PR run pattern + the "actions: read" cross-workflow permission
  # surface. The pull_request trigger is the actual gate; the parallel
  # single-runtime workflows (bash-runner.yml + python-runner.yml +
  # bun-runner.yml) provide observability via artifact upload.
  pull_request:
    paths:
      - 'tests/fixtures/model-resolution/**'
      - 'tests/bash/golden_resolution.sh'
      - 'tests/bash/golden_resolution.bats'
      - 'tests/python/golden_resolution.py'
      - 'tests/typescript/golden_resolution.ts'
      - '.claude/scripts/generated-model-maps.sh'
      - '.claude/scripts/lib/model-resolver.sh'
      - '.claude/skills/bridgebuilder-review/package.json'
      - '.claude/skills/bridgebuilder-review/package-lock.json'
      - '.github/workflows/cross-runtime-diff.yml'

permissions:
  contents: read

concurrency:
  group: cycle099-sprint-1d-diff-${{ github.ref }}
  cancel-in-progress: true

jobs:
  cross-runtime-diff:
    name: T1.12 cross-runtime byte-equality gate
    runs-on: ubuntu-latest
    steps:
      # PINNING: SHA verified against actions/checkout v4.3.1 tag
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      # PINNING: SHA matches actions/setup-python v5.3.0 used elsewhere in repo.
      - uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0
        with:
          python-version: '3.13'

      # PINNING: SHA verified against actions/setup-node v4.1.0 tag
      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: '20'

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install 'pyyaml==6.0.2'

      - name: Install yq v4.52.4 (pinned + checksum verified)
        run: |
          set -euo pipefail
          local_yq=/usr/local/bin/yq
          expected_sha256='0c4d965ea944b64b8fddaf7f27779ee3034e5693263786506ccd1c120f184e8c'
          sudo wget -qO "$local_yq" https://github.com/mikefarah/yq/releases/download/v4.52.4/yq_linux_amd64
          echo "$expected_sha256  $local_yq" | sha256sum -c -
          sudo chmod +x "$local_yq"

      - name: Install BB skill node_modules (for tsx)
        working-directory: .claude/skills/bridgebuilder-review
        # cypherpunk HIGH-1: --ignore-scripts disables npm lifecycle hooks.
        run: npm ci --no-audit --no-fund --ignore-scripts

      # Run all three runners IN-LINE rather than relying on workflow_run
      # artifact orchestration. This makes the diff job self-contained and
      # avoids the timing complexity of cross-workflow artifact passing.
      # Each runner is exercised by its dedicated workflow above (in
      # parallel, for fast feedback); this job is the GATE that asserts
      # byte-equality.
      - name: Run bash runner
        run: bash tests/bash/golden_resolution.sh > bash-out.jsonl

      - name: Run python runner
        run: python tests/python/golden_resolution.py > python-out.jsonl

      - name: Run TS runner
        run: |
          node .claude/skills/bridgebuilder-review/node_modules/tsx/dist/cli.mjs \
              tests/typescript/golden_resolution.ts \
              > typescript-out.jsonl

      - name: Verify byte-equal across runtimes
        run: |
          set -euo pipefail
          echo "=== bash output ==="
          cat bash-out.jsonl
          echo "=== python output ==="
          cat python-out.jsonl
          echo "=== typescript output ==="
          cat typescript-out.jsonl

          # Diff bash vs python
          if ! diff -u bash-out.jsonl python-out.jsonl > /tmp/bash-vs-python.diff; then
            echo "::error::[CROSS-RUNTIME-DIFF-FAIL] bash vs python diverge:"
            cat /tmp/bash-vs-python.diff
            exit 1
          fi
          echo "OK — bash == python (byte-equal)"

          # Diff bash vs TypeScript
          if ! diff -u bash-out.jsonl typescript-out.jsonl > /tmp/bash-vs-ts.diff; then
            echo "::error::[CROSS-RUNTIME-DIFF-FAIL] bash vs typescript diverge:"
            cat /tmp/bash-vs-ts.diff
            exit 1
          fi
          echo "OK — bash == typescript (byte-equal)"

          # Diff python vs TypeScript (transitivity, but explicit)
          if ! diff -u python-out.jsonl typescript-out.jsonl > /tmp/python-vs-ts.diff; then
            echo "::error::[CROSS-RUNTIME-DIFF-FAIL] python vs typescript diverge:"
            cat /tmp/python-vs-ts.diff
            exit 1
          fi
          echo "OK — python == typescript (byte-equal)"

          echo ""
          echo "✅ All three runtimes produce byte-identical output ($(wc -l < bash-out.jsonl) lines)"

      - name: Verify output matches committed golden file
        run: |
          set -euo pipefail
          if [ ! -f tests/fixtures/model-resolution/_golden.bash.jsonl ]; then
            echo "::error::Committed golden file missing"
            exit 1
          fi
          if ! diff -u tests/fixtures/model-resolution/_golden.bash.jsonl bash-out.jsonl; then
            echo "::error::Runner output drifted from committed golden file"
            echo "Regenerate via: bash tests/bash/golden_resolution.sh > tests/fixtures/model-resolution/_golden.bash.jsonl"
            exit 1
          fi
          echo "OK — output matches committed golden file"
