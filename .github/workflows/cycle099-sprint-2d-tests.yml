name: cycle-099 Sprint 2D resolver tests

# cycle-099 Sprint 2D (T2.6) — bats tests for the FR-3.9 6-stage resolver.
#
# Runs:
#   - tests/integration/sprint-2D-resolver-parity.bats (P1-P14: cross-runtime
#     parity assertion + spec compliance + IMP-007 + FR-3.4 gating)
#   - tests/bash/golden_resolution.bats (G1-G15: per-runner contract pins)
#   - Production-yaml smoke: resolve every framework skill against the real
#     `.claude/defaults/model-config.yaml` (cycle-099 sprint-1E.a lesson —
#     production smoke catches schema-vs-reality drift).
#
# Mandatory gate: any failure here blocks the PR. Cross-runtime byte equality
# is also gated by `.github/workflows/cross-runtime-diff.yml`.

on:
  pull_request:
    paths:
      - '.claude/scripts/lib/model-resolver.py'
      - '.claude/data/trajectory-schemas/model-resolver-output.schema.json'
      - 'tests/python/golden_resolution.py'
      - 'tests/bash/golden_resolution.sh'
      - 'tests/bash/golden_resolution.bats'
      - 'tests/integration/sprint-2D-resolver-parity.bats'
      - 'tests/fixtures/model-resolution/**'
      - '.claude/defaults/model-config.yaml'
      - '.github/workflows/cycle099-sprint-2d-tests.yml'
  push:
    branches: [main]
    paths:
      - '.claude/scripts/lib/model-resolver.py'
      - '.claude/data/trajectory-schemas/model-resolver-output.schema.json'
      - 'tests/python/golden_resolution.py'
      - 'tests/bash/golden_resolution.sh'
      - 'tests/bash/golden_resolution.bats'
      - 'tests/integration/sprint-2D-resolver-parity.bats'
      - 'tests/fixtures/model-resolution/**'
      - '.claude/defaults/model-config.yaml'

permissions:
  contents: read

concurrency:
  group: cycle099-sprint-2d-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  resolver-bats:
    name: Sprint 2D resolver bats
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      # PINNING: SHA verified against actions/checkout v4.3.1
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      # PINNING: SHA matches actions/setup-python v5.3.0
      - uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0
        with:
          python-version: '3.13'

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install 'pyyaml==6.0.2' 'jsonschema==4.23.0'

      - name: Install yq v4.52.4 (pinned + checksum verified)
        run: |
          set -euo pipefail
          local_yq=/usr/local/bin/yq
          expected_sha256='0c4d965ea944b64b8fddaf7f27779ee3034e5693263786506ccd1c120f184e8c'
          sudo wget -qO "$local_yq" https://github.com/mikefarah/yq/releases/download/v4.52.4/yq_linux_amd64
          echo "$expected_sha256  $local_yq" | sha256sum -c -
          sudo chmod +x "$local_yq"

      - name: Install bats-core
        run: sudo apt-get update && sudo apt-get install -y bats jq

      - name: Run G-series (per-runner contract pins)
        run: bats tests/bash/golden_resolution.bats

      - name: Run P-series (cross-runtime parity + spec compliance)
        run: bats tests/integration/sprint-2D-resolver-parity.bats

  production-yaml-smoke:
    name: Production-yaml smoke (resolves against real model-config.yaml)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # Sprint 1E.a lesson: every schema-tightening PR must include a smoke
    # against the most-permissive real-world fixture (`.claude/defaults/
    # model-config.yaml`). For Sprint 2D this means: load production config,
    # resolve every framework skill via the canonical Python resolver, and
    # assert no [NO-RESOLUTION] errors. Catches schema-vs-reality drift before
    # operators hit it.
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0
        with:
          python-version: '3.13'

      - name: Install Python deps
        run: pip install 'pyyaml==6.0.2' 'jsonschema==4.23.0'

      - name: Resolve all framework skills against production model-config.yaml
        run: |
          python - <<'PY'
          # Cypherpunk MED-2 fix: this gate now FAILS on regression. Pre-fix
          # version was advisory-only — a PR that broke `_stage5_framework_default`
          # such that no production skill resolved would have shipped silently
          # since both runners broke identically (cross-runtime gate stays
          # green). We now require: ≥80% of declared production agents resolve.
          # Non-resolutions still log as advisories (some agents legitimately
          # require operator config); but a wholesale resolver break trips the
          # 80% floor and fails the build.
          import importlib.util, sys
          import yaml

          spec = importlib.util.spec_from_file_location(
              'mr', '.claude/scripts/lib/model-resolver.py'
          )
          mr = importlib.util.module_from_spec(spec)
          spec.loader.exec_module(mr)

          with open('.claude/defaults/model-config.yaml') as fh:
              framework_defaults = yaml.safe_load(fh) or {}

          merged = {
              'schema_version': 2,
              'framework_defaults': framework_defaults,
              'operator_config': {},
          }

          agents = framework_defaults.get('agents') or {}
          if not agents:
              print('::warning::production model-config.yaml has no `agents:` block — smoke degenerate')
              sys.exit(0)

          ok_count = 0
          err_count = 0
          for skill_name in sorted(agents.keys()):
              result = mr.resolve(merged, skill_name, 'primary')
              if 'error' in result:
                  err_count += 1
                  print(f'::warning::skill `{skill_name}` did not resolve: {result["error"]["code"]}')
              else:
                  ok_count += 1
                  print(f'OK — {skill_name} primary → {result["resolved_provider"]}:{result["resolved_model_id"]}')

          total = len(agents)
          ok_ratio = ok_count / total if total else 0
          print(f'Production smoke: {ok_count}/{total} resolved ({ok_ratio:.0%}); {err_count} advisory.')

          # Regression gate: at least 80% of declared agents must resolve.
          # Today's baseline is ~21/21 (100%); 80% gives some headroom for
          # legitimate operator-required skills without admitting a wholesale
          # resolver regression.
          MIN_OK_RATIO = 0.80
          if ok_ratio < MIN_OK_RATIO:
              print(f'::error::production-smoke regression: {ok_count}/{total} ({ok_ratio:.0%}) below threshold {MIN_OK_RATIO:.0%}')
              sys.exit(1)
          PY
